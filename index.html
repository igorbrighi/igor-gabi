<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Lua de Mel · Tanzânia & Zanzibar</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --safari: #2E5A44; --savannah: #C87A3E; --ocean: #1F6E8C; --gold: #D4AF37;
  --bg: #FDFBF8; --card: #FFFFFF; --text: #2C2520; --muted: #7A6F66;
  --shadow: rgba(44, 37, 32, 0.08); --r: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

/* Navegação Superior */
.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(253, 251, 248, 0.9); backdrop-filter: blur(10px); height: 60px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid rgba(0,0,0,0.05); }
.nav-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--safari); }
.nav-title span { color: var(--gold); font-style: italic; }

/* Tabs Inferiores */
.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; background: white; display: flex; height: 70px; padding-bottom: env(safe-area-inset-bottom); border-top: 1px solid rgba(0,0,0,0.05); box-shadow: 0 -4px 20px var(--shadow); }
.tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; background: none; border: none; cursor: pointer; color: var(--muted); transition: 0.3s; }
.tab-item.active { color: var(--safari); font-weight: 700; }
.tab-item i { font-size: 22px; margin-bottom: 2px; }
.tab-item span { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Conteúdo */
.view { display: none; padding: 80px 20px 100px; max-width: 600px; margin: 0 auto; animation: fadeIn 0.4s ease; }
.view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Cards */
.category-hdr { margin-bottom: 20px; }
.category-hdr h2 { font-family: 'Cormorant Garamond', serif; font-size: 32px; color: var(--safari); }
.category-hdr p { font-size: 14px; color: var(--muted); }

.day-card { background: var(--card); border-radius: var(--r); padding: 18px; margin-bottom: 12px; box-shadow: 0 4px 15px var(--shadow); display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; border: 1px solid rgba(0,0,0,0.02); }
.day-card:active { transform: scale(0.97); }
.day-date-circle { width: 50px; height: 50px; border-radius: 50%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid var(--gold); }
.day-date-circle .d { font-weight: 700; font-size: 16px; color: var(--safari); line-height: 1; }
.day-date-circle .m { font-size: 9px; text-transform: uppercase; color: var(--muted); }
.day-content { flex: 1; }
.day-content h3 { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.day-content p { font-size: 12px; color: var(--muted); }

/* Bottom Sheet (Abertura de Informações) */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(2px); }
.overlay.active { opacity: 1; visibility: visible; }
.bottom-sheet { position: fixed; left: 0; right: 0; bottom: -100%; background: var(--bg); z-index: 2001; border-radius: 24px 24px 0 0; padding: 30px 20px; transition: 0.4s cubic-bezier(0.17, 0.84, 0.44, 1); max-height: 90vh; overflow-y: auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.2); }
.bottom-sheet.active { bottom: 0; }
.sheet-handle { width: 40px; height: 5px; background: #DDD; border-radius: 10px; margin: -15px auto 20px; }

/* Detalhes dentro da Sheet */
.detail-tag { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-bottom: 10px; }
.tag-safari { background: #E6F0EA; color: var(--safari); }
.tag-flight { background: #E1EDF2; color: var(--ocean); }
.tag-lod { background: #F9F1E6; color: var(--savannah); }
.detail-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; margin-bottom: 15px; }
.info-box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 3px solid var(--gold); }
.info-box label { font-size: 10px; text-transform: uppercase; color: var(--muted); font-weight: 700; display: block; margin-bottom: 5px; }

/* Aba Mapa */
#map { height: calc(100vh - 130px); width: 100%; border-radius: 12px; z-index: 1; }

/* Swahili */
.frase-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; position: relative; border: 1px solid rgba(0,0,0,0.03); }
.frase-item:active { background: #F9F1E6; }
.frase-sw { font-weight: 700; color: var(--safari); font-size: 16px; }
.frase-pt { color: var(--text); font-size: 14px; margin-top: 2px; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-title">Lua de Mel · <span>Tanzânia & Zanzibar</span></div>
</nav>

<main id="view-safari" class="view active">
  <div class="category-hdr">
    <h2>Safaris & Parques</h2>
    <p>A jornada selvagem pela Tanzânia</p>
  </div>
  <div id="grid-safari"></div>
</main>

<main id="view-zanzibar" class="view">
  <div class="category-hdr">
    <h2>Zanzibar</h2>
    <p>O paraíso turquesa do Índico</p>
  </div>
  <div id="grid-zanzibar"></div>
</main>

<main id="view-map" class="view" style="padding: 70px 0 0 0;">
  <div id="map"></div>
</main>

<main id="view-swahili" class="view">
  <div class="category-hdr">
    <h2>Swahili</h2>
    <p>Expressões para o dia a dia</p>
  </div>
  <div id="grid-swahili"></div>
</main>

<nav class="tab-bar">
  <button class="tab-item active" onclick="showTab('safari')"><i>🦁</i><span>Safari</span></button>
  <button class="tab-item" onclick="showTab('zanzibar')"><i>🏖️</i><span>Zanzibar</span></button>
  <button class="tab-item" onclick="showTab('map')"><i>🗺️</i><span>Mapa</span></button>
  <button class="tab-item" onclick="showTab('swahili')"><i>🗣️</i><span>Frases</span></button>
</nav>

<div id="overlay" class="overlay" onclick="closeSheet()"></div>
<div id="bottom-sheet" class="bottom-sheet">
  <div class="sheet-handle"></div>
  <div id="sheet-content"></div>
</div>
