<html lang="pt-BR">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Igor & Gabi · Tanzânia & Zanzibar</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Igor & Gabi">
<meta name="theme-color" content="#2E5A44">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-sand: #FAF8F5;
  --bg-card: #FFFFFF;
  --border-color: #EFEAE2;
  --safari-green: #2E5A44;
  --savannah: #C87A3E;
  --zanzibar-blue: #1F6E8C;
  --gold: #D4AF37;
  --ink-dark: #231E1B;
  --ink-muted: #8A8073;
  --white: #FFFFFF;
  --sh: rgba(44, 37, 32, 0.04);
  --sh-hover: rgba(44, 37, 32, 0.08);
  --r: 16px;
  --rs: 10px;

  /* Cores temáticas de fundo para a página principal */
  --bg-safari-theme: #FAF5EE;   /* Areia quente / Savana */
  --bg-zanzibar-theme: #EAF3F7; /* Azul piscina / Mar tropical */
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg-sand); color: var(--ink-dark); min-height: 100vh; padding-bottom: 85px; letter-spacing: -0.01em; transition: background-color 0.3s ease; }

/* Alteração dinâmica do fundo baseada na aba ativa */
body.theme-safari { background-color: var(--bg-safari-theme); }
body.theme-zanzibar { background-color: var(--bg-zanzibar-theme); }
body.theme-frases { background-color: var(--bg-sand); }

/* Barra Superior Elegante */
.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; background: var(--safari-green); height: 60px; display: flex; align-items: center; justify-content: center; padding: 0 16px; box-shadow: 0 2px 12px rgba(25, 54, 39, 0.12); transition: background-color 0.3s ease; }
.nav-title { font-family: 'Cormorant Garamond', serif; color: var(--white); font-size: 20px; font-weight: 600; letter-spacing: .03em; text-align: center; }
.nav-title span { color: var(--gold); font-style: italic; font-weight: 400; }

/* Modificadores da barra superior por tema */
body.theme-zanzibar .nav { background: var(--zanzibar-blue); box-shadow: 0 2px 12px rgba(31, 110, 140, 0.15); }

/* Views com transição suave */
.view { display: none; padding: 76px 16px 20px; max-width: 600px; margin: 0 auto; animation: fadeIn 0.25s ease-in-out; }
.view.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Contagem Regressiva Estilo Tag minimalista */
.cd-banner { background: #EFEECE; border: 1px solid rgba(212, 175, 55, 0.3); padding: 12px; border-radius: var(--rs); text-align: center; font-size: 13px; font-weight: 600; color: #6E5613; margin-bottom: 16px; letter-spacing: 0.01em; box-shadow: inset 0 1px 2px rgba(255,255,255,0.6); }

/* Header Temático Premium */
.trip-hdr { background: linear-gradient(135deg, var(--safari-green), #163023); border-radius: var(--r); padding: 26px 20px; color: var(--white); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(46, 90, 68, 0.15); position: relative; overflow: hidden; }
.trip-hdr::after { content: ''; position: absolute; bottom: -50px; right: -50px; width: 140px; height: 140px; background: rgba(255,255,255,0.03); border-radius: 50%; }
.trip-hdr h2 { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; margin-bottom: 6px; letter-spacing: 0.01em; }
.trip-subtitle { font-size: 12px; color: #B3D1C1; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }

/* Cards de Itinerário Sofisticados */
.day-card { background: var(--white); border-radius: var(--r); padding: 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; margin-bottom: 10px; box-shadow: 0 4px 10px var(--sh); border: 1px solid var(--border-color); transition: all 0.2s ease; }
.day-card:active { transform: scale(0.98); box-shadow: 0 2px 4px var(--sh); background: #FAF9F7; }
.day-num { width: 48px; height: 48px; border-radius: var(--rs); display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; color: var(--white); box-shadow: 0 3px 6px rgba(0,0,0,0.05); }
.view-safari .day-num { background: linear-gradient(135deg, var(--savannah), #A8612A); }
.view-zanzibar .day-num { background: linear-gradient(135deg, var(--zanzibar-blue), #154D63); }
.dn-n { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700; line-height: 1; }
.dn-m { font-size: 9px; text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; opacity: 0.9; }
.day-info { flex: 1; min-width: 0; }
.day-tt { font-weight: 600; font-size: 15px; color: var(--ink-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.day-sub { font-size: 13px; color: var(--ink-muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Novas Tags Clean */
.day-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.dtag { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
.dtag.lod { background: #FDF5F0; color: var(--savannah); border: 1px solid rgba(200, 122, 62, 0.15); }
.dtag.saf { background: #EDF4F1; color: var(--safari-green); border: 1px solid rgba(46, 90, 68, 0.15); }
.dtag.flight { background: #EDF5F7; color: var(--zanzibar-blue); border: 1px solid rgba(31, 110, 140, 0.15); }
.dtag.tour { background: #FCF9EC; color: #8A6D1C; border: 1px solid rgba(212, 175, 55, 0.2); }

/* Detalhes Internos Aprimorados */
.detail-container { display: none; animation: fadeIn 0.2s ease-in-out; }
.dd-hdr { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; padding-bottom: 4px; }
.back-btn { width: 42px; height: 42px; background: var(--white); border: 1px solid var(--border-color); border-radius: var(--rs); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px var(--sh); color: var(--ink-dark); transition: background 0.15s; }
.back-btn:active { background: var(--border-color); }
.dd-title-box { flex: 1; min-width: 0; }
.dd-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; color: var(--ink-dark); line-height: 1.2; }
.dd-date { font-size: 12px; color: var(--ink-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.03em; margin-top: 2px; }

.info-block { background: var(--white); border-radius: var(--r); padding: 18px; margin-bottom: 14px; box-shadow: 0 4px 12px var(--sh); border: 1px solid var(--border-color); border-left: 4px solid var(--border-color); position: relative; }
.info-block.lod-s { border-left-color: var(--gold); }
.info-block.saf-s { border-left-color: var(--savannah); }
.info-block.flight-s { border-left-color: var(--zanzibar-blue); }
.block-ttl { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; font-weight: 700; margin-bottom: 8px; color: var(--ink-muted); display: flex; align-items: center; gap: 5px; }
.block-content { font-size: 14px; line-height: 1.6; color: #3A332E; }

/* Swahili Modernizado */
.search-box { background: var(--white); border: 1px solid var(--border-color); padding: 14px 16px; border-radius: var(--r); width: 100%; font-size: 14px; margin-bottom: 18px; font-family: inherit; outline: none; box-shadow: 0 4px 10px var(--sh); transition: border-color 0.2s; }
.search-box:focus { border-color: var(--gold); }
.frase-card { background: var(--white); border-radius: var(--r); padding: 16px; margin-bottom: 10px; box-shadow: 0 4px 10px var(--sh); border: 1px solid var(--border-color); position: relative; cursor: pointer; transition: all 0.15s ease; }
.frase-card:active { background: #FAF9F6; transform: scale(0.99); }
.fr-sw { font-size: 17px; font-weight: 700; color: var(--safari-green); margin-bottom: 4px; }
body.theme-zanzibar .fr-sw { color: var(--zanzibar-blue); }
.fr-pt { font-size: 14px; color: var(--ink-dark); font-weight: 500; }
.fr-tip { font-size: 12px; color: var(--ink-muted); font-style: italic; margin-top: 6px; line-height: 1.4; background: #FAF9F6; padding: 6px 10px; border-radius: 6px; }
.copy-indicator { position: absolute; top: 16px; right: 16px; font-size: 11px; color: var(--gold); opacity: 0; transition: opacity 0.2s; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; background: #FDF9EC; padding: 2px 6px; border-radius: 4px; }
.frase-card.copied .copy-indicator { opacity: 1; }

/* Barra de Abas Estilo App Premium */
.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; background: rgba(255, 255, 255, 0.94); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px); border-top: 1px solid var(--border-color); display: flex; height: 66px; box-shadow: 0 -4px 15px rgba(0,0,0,0.03); padding-bottom: env(safe-area-inset-bottom); }
.tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; cursor: pointer; border: none; background: none; transition: all 0.2s ease; position: relative; }
.tab-item .ti { font-size: 20px; line-height: 1; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.tab-item .tl { font-size: 11px; color: var(--ink-muted); font-weight: 600; letter-spacing: 0.01em; }

/* Micro-Indicador de Aba ativa */
.tab-item::after { content: ''; position: absolute; top: 0; width: 24px; height: 3px; border-radius: 0 0 4px 4px; opacity: 0; transition: all 0.2s ease; }

.tab-item.active .ti { transform: scale(1.2) translateY(-2px); }
.tab-item.active.safari::after { background: var(--savannah); opacity: 1; }
.tab-item.active.safari .tl { color: var(--savannah); }
.tab-item.active.zanzibar::after { background: var(--zanzibar-blue); opacity: 1; }
.tab-item.active.zanzibar .tl { color: var(--zanzibar-blue); }
.tab-item.active.frases::after { background: var(--gold); opacity: 1; }
.tab-item.active.frases .tl { color: var(--gold); }
</style>

  { sw: "Jambo / Habari", pt: "Olá / Como vai?", tip: "Cumprimento mais comum e amigável." },
  { sw: "Asante / Asante sana", pt: "Obrigado / Muito obrigado", tip: "Essencial para usar em hotéis e com os guias." },

function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  
  document.getElementById('view-' + viewId).classList.add('active');
  document.querySelector('.tab-bar .tab-item.' + viewId).classList.add('active');
  
  // Atualiza as classes do body para refletir a paleta visual correta
  document.body.className = '';
  document.body.classList.add('theme-' + viewId);

  if(viewId === 'safari' || viewId === 'zanzibar') {
    document.getElementById('list-' + viewId).style.display = "block";
    document.getElementById('detail-' + viewId).style.display = "none";
  }
  window.scrollTo(0,0);
}

function renderGrid(categoria) {
  const grid = document.getElementById('grid-' + categoria);
  grid.innerHTML = "";
  
  ITINERARIO[categoria].forEach((dia, idx) => {
    const card = document.createElement('div');
    card.className = "day-card";
    card.onclick = () => showDetail(categoria, idx);
    
    const [d, m] = dia.data.split('/');
    const nomeMes = m === '06' ? 'Jun' : 'Mai';
    
    card.innerHTML = `
      <div class="day-num">
        <span class="dn-n">${d}</span>
        <span class="dn-m">${nomeMes}</span>
      </div>
      <div class="day-info">
        <div class="day-tt">${dia.local}</div>
        <div class="day-sub">${dia.sub}</div>
        <div class="day-tags">
          <span class="dtag lod">🏨 ${dia.hospedagem.split(' ')[0]}</span>
          ${dia.safari ? '<span class="dtag saf">🦁 Safari</span>' : ''}
          ${dia.voo ? '<span class="dtag flight">✈️ Voo</span>' : ''}
          ${dia.passeio ? '<span class="dtag tour">🏖️ Passeio</span>' : ''}
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function showDetail(categoria, idx) {
  const dia = ITINERARIO[categoria][idx];
  const listContainer = document.getElementById('list-' + categoria);
  const detailContainer = document.getElementById('detail-' + categoria);
  
  detailContainer.innerHTML = `
    <div class="dd-hdr">
      <button class="back-btn" onclick="hideDetail('${categoria}')">←</button>
      <div class="dd-title-box">
        <div class="dd-title">${dia.local}</div>
        <div class="dd-date">${dia.diaSemana} — ${dia.data}/2026</div>
      </div>
    </div>
    
    <div class="info-block lod-s">
      <div class="block-ttl">🏨 Hospedagem / Onde Dormir</div>
      <div class="block-content"><strong>${dia.hospedagem}</strong></div>
    </div>

    ${dia.safari ? `
    <div class="info-block saf-s">
      <div class="block-ttl">🦁 Atividades do Safari</div>
      <div class="block-content">${dia.safari}</div>
    </div>` : ''}

    ${dia.passeio ? `
    <div class="info-block" style="border-left-color: var(--gold)">
      <div class="block-ttl">🏖️ Passeios & Lazer</div>
      <div class="block-content">${dia.passeio}</div>
    </div>` : ''}

    ${dia.voo ? `
    <div class="info-block flight-s">
      <div class="block-ttl">✈️ Informações de Logística & Voo</div>
      <div class="block-content">${dia.voo}</div>
    </div>` : ''}
  `;
  
  listContainer.style.display = "none";
  detailContainer.style.display = "block";
  window.scrollTo(0,0);
}

function hideDetail(categoria) {
  document.getElementById('list-' + categoria).style.display = "block";
  document.getElementById('detail-' + categoria).style.display = "none";
}

function renderFrases(lista) {
  const container = document.getElementById('frases-container');
  container.innerHTML = "";
  lista.forEach(f => {
    const card = document.createElement('div');
    card.className = "frase-card";
    card.onclick = () => copyText(card, f.sw);
    card.innerHTML = `
      <div class="fr-sw">${f.sw}</div>
      <div class="fr-pt">${f.pt}</div>
      <div class="fr-tip">${f.tip}</div>
      <div class="copy-indicator">Copiado!</div>
    `;
    container.appendChild(card);
  });
}

function filterFrases() {
  const query = document.getElementById('search-frases').value.toLowerCase();
  const filtradas = FRASES.filter(f => 
    f.sw.toLowerCase().includes(query) || f.pt.toLowerCase().includes(query)
  );
  renderFrases(filtradas);
}

function copyText(element, text) {
  if(navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      element.classList.add('copied');
      setTimeout(() => element.classList.remove('copied'), 1500);
    });
  }
}

function renderCountdown() {
  const targetDate = new Date("2026-06-03T18:00:00").getTime();
  const now = new Date().getTime();
  const diff = targetDate - now;
  const banner = document.getElementById('countdown-banner');
  
  if (diff <= 0) {
    banner.innerText = "❤️ A grande viagem começou! Aproveitem cada segundo! 🌍";
  } else {
    const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    banner.innerText = `⏳ Faltam exatamente ${dias} dias para a Lua de Mel dos Sonhos!`;
  }
}

(() => {
  renderGrid('safari');
  renderGrid('zanzibar');
  renderFrases(FRASES);
  renderCountdown();
})();
</script>

</body>
